<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verity</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before first paint to avoid a flash of the default light/gray theme.
      // Reads from localStorage (written by usePreferences on every save/load), falls back to
      // the OS dark-mode preference when no preference has been saved yet.
      try {
        var p = JSON.parse(localStorage.getItem('verity:prefs') || 'null')
        var mode = p && p.theme_mode
        var dark = mode === 'dark' || (mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
        var palette = p && p.theme_palette
        if (palette && palette !== 'gray') document.documentElement.dataset.theme = palette
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
