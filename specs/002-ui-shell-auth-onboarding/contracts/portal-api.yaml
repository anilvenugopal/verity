openapi: 3.1.0
info:
  title: Verity Portal — Hub API (consumed surface)
  version: 0.2.0
  description: >
    The subset of the Verity Hub API consumed by the portal SPA (002-ui-shell-auth-onboarding).
    Auth endpoints marked NEW are not yet implemented; they must be added to
    hub/src/verity/hub/auth/session.py alongside M1 portal work.
    All routes are served from the same origin as the portal (Vite proxy in dev,
    FastAPI static mount in prod).

servers:
  - url: http://localhost:8000
    description: Local development

# ─────────────────────────────────────────────
# AUTH (session endpoints — M1)
# ─────────────────────────────────────────────
paths:

  /auth/login:
    get:
      summary: >
        [NEW] Initiate Entra OIDC login — mints state/nonce/PKCE server-side,
        stores in session, 302 → Entra /authorize.
      tags: [auth]
      parameters:
        - name: next
          in: query
          description: Allow-listed post-login redirect path
          schema: { type: string }
      responses:
        "302":
          description: Redirect to Entra /authorize
          headers:
            Location: { schema: { type: string } }
        "400":
          description: Bad next parameter (not on allow-list)

  /auth/callback:
    get:
      summary: >
        [NEW] OIDC callback — verifies state, exchanges code, validates ID token,
        JIT-provisions user, issues HttpOnly session cookie, redirects to next.
      tags: [auth]
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
        - name: error
          in: query
          description: IdP error code (if present, request is rejected)
          schema: { type: string }
      responses:
        "302":
          description: Redirect to next URL (success) or /signin (failure)
          headers:
            Location: { schema: { type: string } }
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly SameSite=Lax session cookie

  /auth/mock:
    post:
      summary: >
        [NEW] Mock login (local dev only, VERITY_AUTH_MODE=mock).
        Establishes a session for the configured synthetic principal.
        Returns 404 when auth_mode != mock.
      tags: [auth]
      responses:
        "200":
          description: Session established
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
          headers:
            Set-Cookie:
              schema: { type: string }
        "404":
          description: Mock auth not available in this environment

  /auth/logout:
    post:
      summary: >
        [NEW] Invalidate server-side session immediately.
        Redirects to /signin (or returns 200 for SPA-driven logout).
      tags: [auth]
      responses:
        "200":
          description: Session invalidated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /me:
    get:
      summary: >
        [EXISTING — needs extension] Return the authenticated principal.
        Extension adds email and app_team_roles.
      tags: [auth]
      responses:
        "200":
          description: Authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"

# ─────────────────────────────────────────────
# REFERENCE + DASHBOARD (M3 — portal support)
# ─────────────────────────────────────────────

  /reference/codes/{table}:
    get:
      summary: >
        Rows of a whitelisted reference list for the badge system: code/label/description plus the
        metadata presentation hints (tone → colour, icon → sprite). 404 if `table` is not whitelisted.
      tags: [reference]
      parameters:
        - name: table
          in: path
          required: true
          schema: { type: string, description: 'whitelisted reference table (e.g. application_status, approval_request_status)' }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [code, label]
                  properties:
                    code:        { type: string }
                    label:       { type: string }
                    description: { type: string, nullable: true }
                    tone:        { type: string, nullable: true, description: 'closed palette: positive | warning | negative | info | neutral' }
                    icon:        { type: string, nullable: true, description: sprite id }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dashboard/stats:
    get:
      summary: Home landing quick-stats (counts from the live tables; view-gated)
      tags: [dashboard]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [applications, pending_approvals, active_decisions]
                properties:
                  applications:      { type: integer }
                  pending_approvals: { type: integer }
                  active_decisions:  { type: integer, description: '0 until a decision/run log exists (surfaced honestly)' }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

# ─────────────────────────────────────────────
# APPLICATIONS (M3)
# ─────────────────────────────────────────────

  /applications:
    get:
      summary: List all applications (requires view action)
      tags: [applications]
      responses:
        "200":
          description: Array of applications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Application" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

    post:
      summary: Propose a new application (requires onboard_application action)
      tags: [applications]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplicationPropose" }
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /applications/{application_id}:
    get:
      summary: Get a single application (requires view action)
      tags: [applications]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: >
        Edit a still-pending application in place (pre-activation remediation, e.g. after a
        rejection). Pending-only (409 otherwise); requires onboard_application (not restricted to
        the owner/proposer). The portal's edit mode uses this; re-submit then opens a fresh approval.
      tags: [applications]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplicationPropose" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      summary: >
        Delete a still-pending application + its dependents (the workspace "Delete" button). Gated
        delete_application (the app team — business_owner/ai_governance/security); pending-only (active
        apps are retired via lifecycle, 409).
      tags: [applications]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /applications/{application_id}/withdraw:
    post:
      summary: >
        Cancel the application's pending approval — the requester withdrawing their own submission
        (the workspace "Cancel request" button). Requires onboard_application + a live pending
        approval (409 otherwise); the app returns to an editable draft. NOTE: this is the requester's
        cancel, distinct from the approver-side withdraw_approval.
      tags: [applications]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /applications/{application_id}/approval:
    get:
      summary: Latest approval for an application (powers the workspace governance rail)
      tags: [applications]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: the application has no approval yet (e.g. a never-submitted draft) }

  /applications/{application_id}/submit:
    post:
      summary: Submit application for approval (requires onboard_application action)
      tags: [applications]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Empty body (approval routing is server-determined)
      responses:
        "201":
          description: Approval request created; use approval_request_id for signoff
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

# ─────────────────────────────────────────────
# APPROVALS (M3)
# ─────────────────────────────────────────────

  /approvals/awaiting-me:
    get:
      summary: >
        The caller's MY APPROVALS queue — pending onboarding requests they can act on (powers the
        bounded MY APPROVALS sidebar group). Empty for non-approvers. Declared before /{id}.
      tags: [approvals]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AwaitingApproval" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /approvals/{approval_request_id}:
    get:
      summary: Get an approval request (requires view action)
      tags: [approvals]
      parameters:
        - name: approval_request_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /approvals/{approval_request_id}/signoff:
    post:
      summary: Record an approval decision (requires signoff action)
      tags: [approvals]
      parameters:
        - name: approval_request_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Signoff" }
      responses:
        "200":
          description: Updated approval request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

# ─────────────────────────────────────────────
# INTAKE LIFECYCLE (M4) — all routes already exist in the hub
# ─────────────────────────────────────────────

  /applications/{application_id}/intakes:
    get:
      summary: List an application's intakes (requires view) — Use Cases tab
      tags: [intakes]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Array of intakes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Intake" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create an intake under an application (requires create_intake)
      tags: [intakes]
      parameters:
        - name: application_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntakeCreate" }
      responses:
        "201":
          description: Intake created (status proposed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Intake" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /intakes:
    get:
      summary: >
        List every intake (newest first) with its parent application's name + created_by — the
        top-level Use Cases list and the MY USE CASES sidebar projection. Requires view.
      tags: [intakes]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IntakeListItem" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /intakes/{intake_id}:
    get:
      summary: Get an intake (requires view)
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Intake" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: >
        Edit a still-revisable intake's title/description in place (pre-activation remediation, e.g.
        after a rejection). Mirrors PUT /applications/{id}. Revisable = status not in
        {approved, in_build, live, retired} (409 otherwise); requires edit_intake. The portal's edit
        mode uses this; re-submit then opens a fresh approval.
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntakeCreate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Intake" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      summary: >
        Delete a still-revisable intake + its dependents (the workspace "Delete" button). Gated
        delete_intake (the app team — business_owner/ai_governance/security); revisable-only (an
        approved/live/retired intake is 409). Requirements cascade; the audit trail is retained.
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /intakes/{intake_id}/withdraw:
    post:
      summary: >
        Cancel the intake's open approval — the requester withdrawing their own submission (the
        workspace "Cancel request" button). Mirrors POST /applications/{id}/withdraw. Requires
        edit_intake + a live pending kind=intake approval (409 otherwise); the intake returns to a
        revisable draft (status unchanged). Distinct from the approver-side withdraw_approval.
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Intake" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /intakes/{intake_id}/requirements:
    get:
      summary: List an intake's requirements (requires view)
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Requirement" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Add a requirement to an intake (intake author)
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequirementCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Requirement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /intakes/{intake_id}/requirements/{intake_requirement_id}:
    put:
      summary: Edit a requirement (kind / title / body) on an intake (requires edit_requirement)
      tags: [intakes]
      parameters:
        - { name: intake_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: intake_requirement_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequirementCreate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Requirement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Remove a requirement from an intake (requires edit_requirement)
      tags: [intakes]
      parameters:
        - { name: intake_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: intake_requirement_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: deleted }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /intakes/{intake_id}/assessment:
    get:
      summary: Get the captured assessment + computed tier (requires view)
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssessmentView" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: >
        Capture the assessment (requires edit_impact_assessment). Per-tab save sends the FULL
        snapshot (both shipped tabs required) → one SCD-2 revision; recomputes tier.
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssessmentInput" }
      responses:
        "200":
          description: Updated assessment view with computed tier
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssessmentView" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }   # terminal intake — cannot re-assess

  /intakes/{intake_id}/assessment/revisions:
    get:
      summary: List assessment revisions (requires view)
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RevisionMeta" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /intakes/{intake_id}/approval:
    get:
      summary: >
        The intake's latest kind=intake approval view (mirrors GET /applications/{id}/approval).
        Powers the intake detail Governance & Approval panel + the Cancel-request affordance. 404 when
        the intake was never submitted — the detail page treats that as "not submitted".
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /intakes/{intake_id}/submit:
    post:
      summary: >
        Submit an assessed intake for approval (requires edit_intake). Requires a computed tier
        (else 400); advances proposed→in_review; opens a kind=intake approval with the tier quorum.
      tags: [intakes]
      parameters:
        - name: intake_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitForApproval" }
      responses:
        "201":
          description: Intake approval request created (kind=intake)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalRequest" }
        "400": { $ref: "#/components/responses/BadRequest" }   # not yet classified (no tier)
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }     # terminal intake / duplicate open approval / empty quorum

# NOTE: GET /approvals/{id} and POST …/signoff are SHARED by onboarding and intake and return the
# single kind-agnostic `ApprovalRequest` shape (dispatched on `request_kind_code`). The UI restricts
# the negative action per kind: onboarding → Return-for-revision (`requested_changes`); intake →
# Reject (`rejected`). This is a UI rule, not an API constraint — the API accepts the full
# `reference.approval_decision` vocabulary.

# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────

components:
  schemas:

    MeResponse:
      type: object
      required: [actor_id, display_name, platform_roles, app_team_roles, is_mock]
      properties:
        actor_id:        { type: string, format: uuid }
        display_name:    { type: string }
        email:           { type: string, nullable: true }
        platform_roles:  { type: array, items: { type: string } }
        app_team_roles:
          type: array
          items:
            type: object
            required: [application_id, application_name, role_code]
            properties:
              application_id:   { type: string, format: uuid }
              application_name: { type: string }
              role_code:        { type: string }
        is_mock:         { type: boolean }

    Application:
      type: object
      required:
        - application_id
        - code
        - name
        - description
        - application_status_code
        - data_classification_code
        - business_owner_actor_id
        - regulatory_framework_codes
        - governance_domain_codes
        - jurisdiction_codes
        - affects_consumers
        - processes_pii
        - consumer_facing
        - created_by_actor_id
        - created_at
      properties:
        application_id:             { type: string, format: uuid }
        code:                       { type: string, pattern: '^[A-Z]{3}$' }
        name:                       { type: string }
        description:                { type: string }
        application_status_code:
          type: string
          enum: [pending, pending_approval, active, suspended, retired]
        line_of_business_code:      { type: string, nullable: true }
        data_classification_code:   { type: string }
        business_owner_actor_id:    { type: string, format: uuid }
        created_by_actor_id:        { type: string, format: uuid, description: the proposer (server-resolved) }
        regulatory_framework_codes: { type: array, items: { type: string } }
        governance_domain_codes:    { type: array, items: { type: string } }
        jurisdiction_codes:         { type: array, items: { type: string } }
        affects_consumers:          { type: boolean }
        processes_pii:              { type: boolean }
        consumer_facing:            { type: boolean }
        created_at:                 { type: string, format: date-time }
        # latest-approval review status — lets the portal derive a display status (Draft / In review /
        # Rejected / Changes requested) for a pending app. Null when never submitted. Display only.
        latest_approval_status:     { type: string, nullable: true }
        latest_decision:            { type: string, nullable: true }

    ApplicationPropose:
      type: object
      required:
        - code
        - name
        - description
        - data_classification_code
        - regulatory_framework_codes
        - governance_domain_codes
        - jurisdiction_codes
        - business_owner_actor_id
        - affects_consumers
        - processes_pii
        - consumer_facing
        - justification
      properties:
        code:                       { type: string, pattern: '^[A-Z]{3}$' }
        name:                       { type: string, minLength: 1 }
        description:                { type: string, minLength: 20 }
        line_of_business_code:      { type: string, nullable: true }
        data_classification_code:   { type: string }
        regulatory_framework_codes: { type: array, items: { type: string }, minItems: 1 }
        governance_domain_codes:    { type: array, items: { type: string }, minItems: 1 }
        jurisdiction_codes:         { type: array, items: { type: string }, minItems: 1 }
        business_owner_actor_id:    { type: string, format: uuid }
        initial_app_team:
          type: array
          items:
            type: object
            required: [actor_id, app_team_role_code]
            properties:
              actor_id:           { type: string, format: uuid }
              app_team_role_code: { type: string }
        affects_consumers:          { type: boolean }
        processes_pii:              { type: boolean }
        consumer_facing:            { type: boolean }
        justification:              { type: string, minLength: 1 }

    AwaitingApproval:
      type: object
      description: A row in the caller's MY APPROVALS queue — a pending request they can act on.
      required: [approval_request_id, application_id, code, name]
      properties:
        approval_request_id: { type: string, format: uuid }
        application_id:      { type: string, format: uuid }
        code:                { type: string }
        name:                { type: string }

    ApprovalRequest:
      type: object
      description: >
        The single kind-agnostic approval shape returned by the hub for BOTH onboarding and intake
        (hub/src/verity/hub/approval/models.py::ApprovalRequest). `required_roles` is the computed
        quorum (FR-IN-005 for intake); `signoffs` are the recorded decisions. Exactly one of
        target_intake_id / target_application_id is set per `request_kind_code`.
      required: [approval_request_id, request_kind_code, status_code, opened_by_actor_id, required_roles, signoffs, created_at]
      properties:
        approval_request_id:   { type: string, format: uuid }
        request_kind_code:     { type: string, enum: [intake, application_onboarding] }
        status_code:           { type: string, enum: [pending, approved, rejected, cancelled] }
        target_intake_id:      { type: string, format: uuid, nullable: true }
        target_application_id: { type: string, format: uuid, nullable: true }
        opened_by_actor_id:    { type: string, format: uuid, description: the submitter — the portal disables their own sign-off (separation of duty) }
        required_roles:        { type: array, items: { type: string } }
        signoffs:
          type: array
          items:
            type: object
            required: [approver_actor_id, signed_as_role_code, decision_code]
            properties:
              approver_actor_id:   { type: string, format: uuid }
              signed_as_role_code: { type: string }
              decision_code:       { type: string, enum: [approved, rejected, requested_changes, abstained] }
              comment:             { type: string, nullable: true }
              created_at:          { type: string, format: date-time, nullable: true, description: sign-off time (drives the workspace history timeline) }
        created_at:            { type: string, format: date-time }

    Signoff:
      type: object
      description: >
        Sign-off body for the shared POST /approvals/{id}/signoff (both kinds). `decision_code` is a
        `reference.approval_decision` value. Resolution is per-kind. Onboarding closes the request on
        `rejected` OR `requested_changes` (both → request `rejected`, so it never deadlocks) or a full
        quorum of `approved` (→ approved + the application activated); a re-submit supersedes a prior
        pending request (→ `cancelled`). The portal onboarding workspace offers Approve / Request
        changes / Reject, and surfaces a derived review status (see Application.latest_*).
      required: [decision_code]
      properties:
        decision_code:
          type: string
          enum: [approved, rejected, requested_changes, abstained]
        comment:
          type: string
          nullable: true

    # ── Intake lifecycle (M4) ──────────────────

    Intake:
      type: object
      required: [intake_id, application_id, title, intake_status_code, created_at]
      properties:
        intake_id:             { type: string, format: uuid }
        application_id:        { type: string, format: uuid }
        title:                 { type: string }
        description:           { type: string, nullable: true }
        intake_status_code:
          type: string
          enum: [proposed, in_review, approved, rejected, retired]
        ai_risk_tier_code:     { type: string, nullable: true }
        naic_materiality_code: { type: string, nullable: true }
        materiality_tier_code: { type: string, nullable: true }
        created_at:            { type: string, format: date-time }

    IntakeListItem:
      type: object
      description: An Intake plus its parent application's name + created_by — for the Use Cases list.
      allOf:
        - $ref: "#/components/schemas/Intake"
        - type: object
          required: [application_name, created_by_actor_id]
          properties:
            application_name:   { type: string }
            created_by_actor_id: { type: string, format: uuid }

    IntakeCreate:
      type: object
      required: [title]
      properties:
        title:       { type: string, minLength: 1 }
        description: { type: string, nullable: true }

    Requirement:
      type: object
      required: [intake_requirement_id, intake_id, requirement_kind_code, requirement_status_code, title, body, created_at]
      properties:
        intake_requirement_id:   { type: string, format: uuid }
        intake_id:               { type: string, format: uuid }
        requirement_kind_code:   { type: string }
        requirement_status_code: { type: string }
        title:                   { type: string }
        body:                    { type: string }
        created_at:              { type: string, format: date-time }

    RequirementCreate:
      type: object
      required: [requirement_kind_code, title, body]
      properties:
        requirement_kind_code: { type: string, minLength: 1 }
        title:                 { type: string, minLength: 1 }
        body:                  { type: string, minLength: 1 }

    AssessmentInput:
      type: object
      description: Both shipped tabs required in one payload — no partial PUT. security_access stays null in M4.
      required: [ai_decision_impact, data]
      properties:
        ai_decision_impact: { $ref: "#/components/schemas/AIDecisionImpact" }
        data:               { $ref: "#/components/schemas/DataTab" }
        security_access:    { type: object, nullable: true }   # M4: always null (tab unbuilt → feature 003)
        rationale:          { type: string, nullable: true }

    AIDecisionImpact:
      type: object
      required: [decision_role, decision_domain, affected_population, adverse_impact, human_oversight, reversibility, gdpr_art22, deployment_scale]
      properties:
        decision_role:      { type: string, enum: [assists, recommends_with_signoff, autonomous] }
        decision_domain:    { type: string, enum: [underwriting, pricing, claims, fraud, marketing, servicing, internal_ops] }
        affected_population: { type: string, enum: [internal_only, brokers_agents, policyholders_consumers, vulnerable] }
        adverse_impact:     { type: string, enum: [negligible, financial, coverage_or_claim_denial, unfair_discriminatory, safety] }
        human_oversight:
          type: object
          required: [strategy]
          properties:
            strategy:  { type: string, enum: [none, on_the_loop, in_the_loop] }
            threshold: { type: string, nullable: true }
        reversibility:      { type: string, enum: [easily_reversible, reversible_with_effort, irreversible] }
        gdpr_art22:         { type: boolean }
        deployment_scale:   { type: string, enum: [pilot, limited, production_wide] }

    DataTab:
      type: object
      required: [description, data_classification_code, pii_presence]
      properties:
        description:              { type: string, minLength: 1 }
        sources:                  { type: array, items: { type: string } }
        data_classification_code: { type: string }
        pii_presence:             { type: string, enum: [none, direct, indirect, special_category] }
        sensitive_categories:     { type: array, items: { type: string } }
        lawful_basis:             { type: string, nullable: true }
        residency:                { type: string, nullable: true }
        retention:                { type: string, nullable: true }
        use:                      { type: string, nullable: true }

    AssessmentView:
      type: object
      required: [intake_id, revision, assessment, created_at]
      properties:
        intake_id:  { type: string, format: uuid }
        revision:   { type: integer }
        assessment: { type: object, description: the stored AssessmentInput }
        computed:   { $ref: "#/components/schemas/Computed" }
        created_at: { type: string, format: date-time }

    Computed:
      type: object
      nullable: true
      required: [auto_rejected]
      properties:
        ai_risk_tier_code:        { type: string, nullable: true }
        naic_materiality_code:    { type: string, nullable: true }
        data_classification_code: { type: string, nullable: true }
        intake_status_code:       { type: string, nullable: true }
        auto_rejected:            { type: boolean }

    RevisionMeta:
      type: object
      required: [revision, valid_from, valid_to, created_by_actor_id]
      properties:
        revision:            { type: integer }
        valid_from:          { type: string, format: date-time }
        valid_to:            { type: string, format: date-time }
        created_by_actor_id: { type: string, format: uuid }

    SubmitForApproval:
      type: object
      properties:
        note: { type: string, nullable: true }

    ApiError:
      type: object
      required: [code, detail, request_id]
      properties:
        code:       { type: string }
        detail:     { type: string }
        request_id: { type: string }

  responses:
    Unauthenticated:
      description: No valid session
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    Forbidden:
      description: Authenticated but action denied
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    Conflict:
      description: State conflict (duplicate or invalid transition)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
