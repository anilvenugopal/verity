openapi: "3.1.0"
info:
  title: Verity Registry API
  version: "005"
  description: |
    Entity model & registry endpoints. All paths are relative to the governance
    API root (e.g. /api/). Authentication uses session cookies or API-key header.
    All write operations require an `acting_role` header or session role context.

servers:
  - url: /api

tags:
  - name: executables
    description: Agents and tasks (the governed, runnable unit)
  - name: prompts
    description: Reusable prompt components
  - name: tools
    description: Callable tool components (agent-only)
  - name: mcp-servers
    description: MCP server components (agent-only)
  - name: connectors
    description: Data connector components
  - name: inference-configs
    description: Inference parameter configs
  - name: composition
    description: Assign/remove components to/from executable versions
  - name: bindings
    description: Source and target data bindings on executable versions
  - name: model-catalog
    description: Provider models, pricing windows, and stable model references
  - name: yaml-io
    description: YAML bundle export and import

paths:

  # ── Executables ────────────────────────────────────────────────────────────

  /registry/executables:
    get:
      tags: [executables]
      summary: List all executables
      parameters:
        - name: kind
          in: query
          schema: { type: string, enum: [agent, task] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExecutableSummary" }

    post:
      tags: [executables]
      summary: Register a new executable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateExecutable" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableSummary" }
        "409":
          description: Duplicate name within kind

  /registry/executables/{executable_id}:
    get:
      tags: [executables]
      summary: Get executable detail
      parameters:
        - { name: executable_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableDetail" }
        "404": { description: Not found }

    patch:
      tags: [executables]
      summary: Update executable description
      parameters:
        - { name: executable_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableDetail" }

  /registry/executables/{executable_id}/versions:
    get:
      tags: [executables]
      summary: List versions of an executable
      parameters:
        - { name: executable_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExecutableVersionSummary" }

    post:
      tags: [executables]
      summary: Create a new version (draft)
      parameters:
        - { name: executable_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateExecutableVersion" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableVersionDetail" }
        "404": { description: Executable not found }
        "409": { description: Duplicate semver }

  /registry/executables/{executable_id}/champion:
    get:
      tags: [executables]
      summary: Resolve current champion (or as-of a timestamp)
      parameters:
        - { name: executable_id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: as_of
          in: query
          description: ISO-8601 timestamp for historical resolution
          schema: { type: string, format: date-time }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableVersionDetail" }
        "404": { description: No champion (never promoted) }

  /registry/versions/{version_id}:
    get:
      tags: [executables]
      summary: Get executable version detail
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableVersionDetail" }
        "404": { description: Not found }

  /registry/versions/{version_id}/promote:
    post:
      tags: [executables]
      summary: Promote version to champion (atomic — retires old champion)
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableVersionSummary" }
        "404": { description: Not found }
        "409": { description: Promotion blocked (gate) }

  # ── Prompts ────────────────────────────────────────────────────────────────

  /registry/prompts:
    get:
      tags: [prompts]
      summary: List all prompts
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PromptSummary" } }
    post:
      tags: [prompts]
      summary: Register a new prompt
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePrompt" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PromptSummary" }
        "409": { description: Duplicate name }

  /registry/prompts/{prompt_id}/versions:
    get:
      tags: [prompts]
      summary: List prompt versions
      parameters:
        - { name: prompt_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PromptVersionSummary" } }

    post:
      tags: [prompts]
      summary: Create a new prompt version
      parameters:
        - { name: prompt_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePromptVersion" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PromptVersionSummary" }
        "409": { description: Duplicate semver }

  /registry/prompt-versions/{prompt_version_id}/used-by:
    get:
      tags: [prompts, composition]
      summary: Reverse lookup — which executable versions use this prompt version
      parameters:
        - { name: prompt_version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/UsedByEntry" } }

  # ── Tools ──────────────────────────────────────────────────────────────────

  /registry/tools:
    get:
      tags: [tools]
      summary: List all tools
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ToolSummary" } }
    post:
      tags: [tools]
      summary: Register a new tool
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTool" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToolSummary" }
        "409": { description: Duplicate name }

  /registry/tools/{tool_id}/versions:
    get:
      tags: [tools]
      parameters:
        - { name: tool_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ToolVersionSummary" } }
    post:
      tags: [tools]
      parameters:
        - { name: tool_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateToolVersion" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToolVersionSummary" }
        "409": { description: Duplicate semver }

  /registry/tool-versions/{tool_version_id}/used-by:
    get:
      tags: [tools, composition]
      summary: Reverse lookup — which executable versions use this tool version
      parameters:
        - { name: tool_version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/UsedByEntry" } }

  # ── MCP Servers ────────────────────────────────────────────────────────────

  /registry/mcp-servers:
    get:
      tags: [mcp-servers]
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/McpServerVersionSummary" } }
    post:
      tags: [mcp-servers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMcpServerVersion" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/McpServerVersionSummary" }

  /registry/mcp-versions/{mcp_version_id}/used-by:
    get:
      tags: [mcp-servers, composition]
      summary: Reverse lookup — which executable versions use this MCP server version
      parameters:
        - { name: mcp_version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/UsedByEntry" } }

  # ── Data Connectors ────────────────────────────────────────────────────────

  /registry/connectors:
    get:
      tags: [connectors]
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ConnectorSummary" } }
    post:
      tags: [connectors]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConnector" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectorSummary" }
        "409": { description: Duplicate name }

  /registry/connectors/{connector_id}/versions:
    get:
      tags: [connectors]
      parameters:
        - { name: connector_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ConnectorVersionSummary" } }
    post:
      tags: [connectors]
      parameters:
        - { name: connector_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConnectorVersion" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectorVersionSummary" }

  # ── Inference Configs ──────────────────────────────────────────────────────

  /registry/inference-configs:
    post:
      tags: [inference-configs]
      summary: Create an inference config
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInferenceConfig" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InferenceConfigDetail" }

  /registry/inference-configs/{config_id}:
    get:
      tags: [inference-configs]
      parameters:
        - { name: config_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InferenceConfigDetail" }
        "404": { description: Not found }

  # ── Composition ────────────────────────────────────────────────────────────

  /registry/versions/{version_id}/prompt-assignments:
    get:
      tags: [composition]
      summary: List prompt assignments for a version
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PromptAssignment" } }
    post:
      tags: [composition]
      summary: Add a prompt assignment
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePromptAssignment" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PromptAssignment" }
        "409": { description: Assignment already exists }

  /registry/versions/{version_id}/prompt-assignments/{prompt_version_id}/{api_role}:
    delete:
      tags: [composition]
      summary: Remove a prompt assignment
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: prompt_version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: api_role, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "404": { description: Not found }

  /registry/versions/{version_id}/tool-assignments:
    get:
      tags: [composition]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ToolAssignment" } }
    post:
      tags: [composition]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateToolAssignment" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToolAssignment" }
        "409":
          description: Already assigned or task-only rejection (tools are agent-only)

  /registry/versions/{version_id}/tool-assignments/{tool_version_id}:
    delete:
      tags: [composition]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: tool_version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }
        "404": { description: Not found }

  /registry/versions/{version_id}/mcp-assignments:
    get:
      tags: [composition]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/McpAssignment" } }
    post:
      tags: [composition]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMcpAssignment" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/McpAssignment" }
        "409":
          description: Already assigned or task-only rejection

  /registry/versions/{version_id}/mcp-assignments/{mcp_version_id}:
    delete:
      tags: [composition]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: mcp_version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }

  # ── Bindings ───────────────────────────────────────────────────────────────

  /registry/versions/{version_id}/source-bindings:
    get:
      tags: [bindings]
      summary: List source bindings for a version
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SourceBinding" } }
    post:
      tags: [bindings]
      summary: Create a source binding
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSourceBinding" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SourceBinding" }
        "422":
          description: |
            Validation error — e.g. storage_object source requires connector_version_id

  /registry/versions/{version_id}/source-bindings/{binding_id}:
    delete:
      tags: [bindings]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: binding_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }
        "404": { description: Not found }

  /registry/versions/{version_id}/target-bindings:
    get:
      tags: [bindings]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/TargetBinding" } }
    post:
      tags: [bindings]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTargetBinding" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TargetBinding" }
        "422":
          description: storage_object target requires connector_version_id and write_mode_code

  /registry/versions/{version_id}/target-bindings/{binding_id}:
    delete:
      tags: [bindings]
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: binding_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }

  # ── Model Catalog ──────────────────────────────────────────────────────────

  /registry/models:
    get:
      tags: [model-catalog]
      summary: List all registered models
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelSummary" } }
    post:
      tags: [model-catalog]
      summary: Register a provider model
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModel" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelSummary" }
        "409": { description: Duplicate model_code }

  /registry/models/{model_id}/prices:
    get:
      tags: [model-catalog]
      summary: List price windows for a model
      parameters:
        - { name: model_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelPrice" } }
    post:
      tags: [model-catalog]
      summary: Record a new price window (closes the current open window atomically)
      parameters:
        - { name: model_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModelPrice" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelPrice" }

  /registry/model-references:
    get:
      tags: [model-catalog]
      summary: List model references
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelReferenceSummary" } }
    post:
      tags: [model-catalog]
      summary: Register a model reference (stable logical alias)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModelReference" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelReferenceSummary" }
        "409": { description: Duplicate reference_code }

  /registry/model-references/{ref_id}/bindings:
    get:
      tags: [model-catalog]
      summary: List binding windows for a model reference
      parameters:
        - { name: ref_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelReferenceBinding" } }
    post:
      tags: [model-catalog]
      summary: Rebind reference to a concrete model (closes current binding atomically)
      parameters:
        - { name: ref_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModelReferenceBinding" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelReferenceBinding" }

  # ── YAML I/O ───────────────────────────────────────────────────────────────

  /registry/versions/{version_id}/export:
    get:
      tags: [yaml-io]
      summary: Export a version and its full composition as a YAML bundle
      parameters:
        - { name: version_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/x-yaml:
              schema: { type: string }
        "404": { description: Not found }

  /registry/import/dry-run:
    post:
      tags: [yaml-io]
      summary: Dry-run import — reports what would change without applying
      requestBody:
        required: true
        content:
          application/x-yaml:
            schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportReport" }
        "422": { description: Malformed bundle or name/kind conflict }

  /registry/import:
    post:
      tags: [yaml-io]
      summary: Apply YAML bundle import (idempotent)
      requestBody:
        required: true
        content:
          application/x-yaml:
            schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportReport" }
        "422": { description: Malformed bundle or name/kind conflict }

# ── Schemas ──────────────────────────────────────────────────────────────────

components:
  schemas:

    ExecutableSummary:
      type: object
      properties:
        executable_id: { type: string, format: uuid }
        kind_code: { type: string, enum: [agent, task] }
        name: { type: string }
        description: { type: string, nullable: true }
        version_count: { type: integer }
        champion_semver: { type: string, nullable: true }

    ExecutableDetail:
      allOf:
        - { $ref: "#/components/schemas/ExecutableSummary" }
        - type: object
          properties:
            versions:
              type: array
              items: { $ref: "#/components/schemas/ExecutableVersionSummary" }

    CreateExecutable:
      type: object
      required: [name, kind_code]
      properties:
        name: { type: string, minLength: 1 }
        kind_code: { type: string, enum: [agent, task] }
        description: { type: string }

    ExecutableVersionSummary:
      type: object
      properties:
        executable_version_id: { type: string, format: uuid }
        executable_id: { type: string, format: uuid }
        semver: { type: string }
        lifecycle_stage: { type: string }
        governance_tier_code: { type: string, nullable: true }
